# ASMI station gantry config (cubos entrypoint format).
# Verbatim copy of ASMI_new configs/gantry/new_asmi_gantry_calibration.yaml —
# this matches the GRBL controller actually running on bear-den-asmi
# ($131 = 284.0 max-travel-Y, $132 = 92.0 max-travel-Z; cubos rejects a mismatch).
serial_port: /dev/ttyUSB0
gantry_type: cub_xl
cnc:
  homing_strategy: standard
  total_z_range: 92.0
  y_axis_motion: head
  # Absolute deck-frame Z used for inter-labware travel and the entry
  # approach to the first well of a scan. Defaults to working_volume.z_max
  # (= 92) when omitted; setting an explicit lower value matches the
  # previous park height the protocols used.
  safe_z: 80.0
working_volume:
  x_min: 0.0
  x_max: 400.0
  y_min: 0.0
  y_max: 284.0
  z_min: 0.0
  z_max: 92.0
grbl_settings:
  homing_enable: true
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 284.0
  max_travel_z: 92.0
  status_report: 0
  soft_limits: true
instruments:
  asmi:
    type: asmi
    vendor: vernier
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    # Labware-relative motion heights live on the protocol scan/measure
    # command (`measurement_height`, `interwell_scan_height`,
    # `indentation_limit_height`).
    force_threshold: -50
    sensor_channels:
    - 1
