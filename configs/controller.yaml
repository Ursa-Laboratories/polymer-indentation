# polymer_indent main-controller config.
#
# Runs on the Keeper box: bear-den-keeper, 10.210.29.11 (win10), user "Kab Lab".
# The controller has no cubos dependency; it reads the frozen YAMLs below, swaps
# the well id into the base protocol, POSTs {gantry_config, deck_config,
# protocol_yaml} to each station Pi, and drives the arm + Opentrons.
#
# bear-den device map (relevant rows):
#   bear-den-keeper   10.210.29.11   win10   user "Kab Lab"        — this controller (and the arm worker)
#   bear-den-scale    10.210.29.12   debian  user sartorius-scale  — UV-curing station ("sharc")
#   bear-den-asmi     10.210.29.17   debian  user asmi             — ASMI station
#   bear-den-arm1     10.210.29.16          (Ufactory xArm)        — arm hardware
#   bear-den-vention  10.210.29.15          (Vention rail)         — rail hardware (driven by the arm worker)
#   Opentrons Flex    10.210.29.218         (00:14:2D:EC:99:70)    — liquid handler (placeholder client only)
#   bear-den-panda    10.210.29.13   debian  user panda            — (not used here)
#
# The optional `ssh:` blocks let `polymer-indent workers {status,up,down,restart,logs}`
# start/stop a station worker on its Pi over SSH. Key-based auth only (no
# passwords here or anywhere) — run `ssh-copy-id <user>@<host>` from the
# controller first, or set `key:` to a private key path.

stations:
  sharc:                                                  # UV-curing station = bear-den-scale
    base_url: "http://10.210.29.12:8000"
    gantry_config: configs/gantry/sharc_gantry.yaml        # verbatim cubos@staging cub_sharc.yaml
    deck_config:   configs/deck/sharc_deck.yaml            # verbatim cubos@staging sharc_uv_deck.yaml
    base_protocol: configs/protocol/sharc_uv_one_well.yaml # well id rewritten per iteration
    timeout_s: 900
    ssh:                                                   # for `polymer-indent workers ... sharc`
      host: 10.210.29.12
      user: sartorius-scale
      repo_dir: ~/polymer_indent                           # where this repo is checked out on the Pi
      python: .venv/bin/python                             # python to launch the worker (rel. to repo_dir, or absolute)
      station_config: configs/stations/sharc.yaml          # rel. to repo_dir
      # key: ~/.ssh/id_ed25519                             # optional; omit to use ssh's default key/agent
      # log: worker.log                                    # rel. to repo_dir (default)

  asmi:                                                   # ASMI station = bear-den-asmi
    base_url: "http://10.210.29.17:8000"
    gantry_config: configs/gantry/asmi_gantry.yaml         # verbatim ASMI_new asmi_gantry.yaml
    deck_config:   configs/deck/asmi_deck.yaml             # verbatim ASMI_new asmi_deck.yaml
    base_protocol: configs/protocol/asmi_indentation_test.yaml  # home → measure(indentation) → home; well id rewritten per iteration
    timeout_s: 900
    ssh:
      host: 10.210.29.17
      user: asmi
      repo_dir: ~/polymer_indent
      python: .venv/bin/python
      station_config: configs/stations/asmi.yaml

arm:
  # xArm hardware = bear-den-arm1 (10.210.29.16); Vention rail = bear-den-vention
  # (10.210.29.15). The arm-transfer HTTP worker (arm_worker/, extracted from
  # denos) runs ON the controller box and talks to that hardware — so base_url is
  # localhost, not the arm's IP. (denos ran its arm worker on keeper too.)
  base_url: "http://localhost:5004"
  timeout_s: 300
  local:                                                   # `polymer-indent workers ... arm` launches it here
    # Needs Python 3.10 (machine-logic-sdk) + the keeper_pc repo on PYTHONPATH
    # (device_drivers.vention_railway). Edit the python path / PYTHONPATH to match
    # your machine; add --mock to the command for a dry run.
    command: ["/opt/homebrew/Caskroom/miniforge/base/envs/armworker/bin/python", "-m", "arm_worker", "--port", "5004"]
    env:
      PYTHONPATH: /Users/charl/Programming/panda/keeper_pc
    log: arm_worker.log                                    # written under <repo>/.run/

opentrons:
  # Opentrons Flex at 10.210.29.218. The controller talks directly to the Flex
  # HTTP API: upload protocol -> create run -> play -> poll.
  base_url: "http://10.210.29.218:31950"
  timeout_s: 600

results:
  db_path: results/polymer_indent.db          # relative to repo root unless absolute

# Whether the run is a dry run by default (controller --mock overrides per invocation).
mock_mode: false
